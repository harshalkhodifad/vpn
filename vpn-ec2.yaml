AWSTemplateFormatVersion: '2010-09-09'
Description: AWS EC2 Instance for VPN Server using hwdsl2/ipsec-vpn-server

Parameters:
  InstanceType:
    Type: String
    Default: t2.micro
    Description: EC2 Instance Type
  VpnDomainName:
    Type: String
    Description: The domain name that will point to the VPN
  VpnUser:
    Type: String
    Description: VPN Username
  VpnPassword:
    Type: String
    NoEcho: true
    Description: Password to protect the downloaded OpenVPN (.ovpn) Client Profile
  SshPublicKey:
    Type: String
    Description: SSH Public Key to access the EC2 instance
    Default: ""
  ActionSshPublicKey:
    Type: String
    Description: Temporary SSH Public Key for GitHub Actions
  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64
    Description: AMI ID for Amazon Linux 2023

Resources:
  VpnSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow VPN traffic (UDP 500, 4500) and SSH
      SecurityGroupIngress:
        - IpProtocol: udp
          FromPort: 1194
          ToPort: 1194
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  VpnInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref AmiId
      SecurityGroups:
        - !Ref VpnSecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          # Add SSH Public Keys for access IMMEDIATELY
          mkdir -p /home/ec2-user/.ssh
          if [ -n "${SshPublicKey}" ]; then
            echo "${SshPublicKey}" >> /home/ec2-user/.ssh/authorized_keys
          fi
          echo "${ActionSshPublicKey}" >> /home/ec2-user/.ssh/authorized_keys
          chmod 700 /home/ec2-user/.ssh
          chmod 600 /home/ec2-user/.ssh/authorized_keys
          chown -R ec2-user:ec2-user /home/ec2-user/.ssh

          yum update -y
          yum install -y docker
          systemctl start docker
          systemctl enable docker

          # Set up OpenVPN
          mkdir -p /etc/openvpn
          export OVPN_DATA="/etc/openvpn"
          
          # Initialize configuration
          docker run -v $OVPN_DATA:/etc/openvpn --rm kylemanna/openvpn ovpn_genconfig \
            -u udp://${VpnDomainName} \
            -n 8.8.8.8 \
            -n 8.8.4.4 \
            -p "redirect-gateway def1 bypass-dhcp" \
            -p "block-outside-dns" \
            -p "block-ipv6"
          
          # Initialize PKI (Unattended)
          docker run -v $OVPN_DATA:/etc/openvpn --rm -e "EASYRSA_BATCH=1" -e "EASYRSA_REQ_CN=${VpnDomainName} CA" kylemanna/openvpn ovpn_initpki nopass

          # Start OpenVPN server daemon
          docker run -v $OVPN_DATA:/etc/openvpn -d -p 1194:1194/udp --restart=always --cap-add=NET_ADMIN --name openvpn kylemanna/openvpn

          # Generate client certificate with password protection
          docker run -v $OVPN_DATA:/etc/openvpn --rm -i -e "EASYRSA_BATCH=1" -e "EASYRSA_PASSIN=pass:${VpnPassword}" -e "EASYRSA_PASSOUT=pass:${VpnPassword}" kylemanna/openvpn easyrsa build-client-full ${VpnUser}

          # Retrieve client config and save it to ec2-user home directory
          docker run -v $OVPN_DATA:/etc/openvpn --rm kylemanna/openvpn ovpn_getclient ${VpnUser} > /home/ec2-user/${VpnUser}.ovpn
          chown ec2-user:ec2-user /home/ec2-user/${VpnUser}.ovpn

Outputs:
  InstanceId:
    Description: Instance ID of the VPN Server
    Value: !Ref VpnInstance
  PublicIp:
    Description: Public IP address of the VPN Server
    Value: !GetAtt VpnInstance.PublicIp
